<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MDPreProcess</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f11;
      color: #e2e2e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }

    header p {
      margin-top: 0.4rem;
      color: #888;
      font-size: 0.95rem;
    }

    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 640px;
    }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #3f3f46;
      border-radius: 8px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    #drop-zone.dragover {
      border-color: #7c3aed;
      background: #1e1630;
    }

    #drop-zone svg {
      width: 2.5rem;
      height: 2.5rem;
      stroke: #52525b;
      margin-bottom: 0.75rem;
    }

    #drop-zone p {
      color: #71717a;
      font-size: 0.9rem;
    }

    #drop-zone strong {
      color: #a78bfa;
    }

    #file-input { display: none; }

    #file-name {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #a1a1aa;
      text-align: center;
      min-height: 1.2em;
    }

    /* Button */
    button#convert-btn {
      margin-top: 1.25rem;
      width: 100%;
      padding: 0.75rem;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button#convert-btn:hover:not(:disabled) { background: #6d28d9; }
    button#convert-btn:disabled { background: #3f3f46; cursor: not-allowed; color: #71717a; }

    /* Status */
    #status {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #a78bfa;
      text-align: center;
      min-height: 1.2em;
    }

    #status.error { color: #f87171; }

    /* Output */
    #output-section { display: none; margin-top: 1.5rem; }

    #output-section h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.6rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #output-section h2 span { color: #52525b; font-weight: 400; font-size: 0.8rem; }

    textarea#md-output {
      width: 100%;
      height: 320px;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 6px;
      color: #d4d4d8;
      font-family: "Menlo", "Consolas", monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      padding: 0.75rem;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .actions button {
      flex: 1;
      padding: 0.6rem;
      border-radius: 6px;
      border: 1px solid #27272a;
      background: #27272a;
      color: #d4d4d8;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .actions button:hover { background: #3f3f46; }
    .actions button.primary { background: #7c3aed; border-color: #7c3aed; color: #fff; }
    .actions button.primary:hover { background: #6d28d9; }
  </style>
</head>
<body>

<header>
  <h1>MDPreProcess</h1>
  <p>Convierte PPT o PDF a Markdown compacto — ahorra tokens con Claude</p>
</header>

<div class="card">
  <div id="drop-zone">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
    </svg>
    <p>Arrastra tu archivo aquí o <strong>haz clic para seleccionar</strong></p>
    <p style="margin-top:0.3rem; font-size:0.8rem;">.pptx · .pdf</p>
    <input type="file" id="file-input" accept=".pptx,.pdf" />
  </div>

  <div id="file-name"></div>

  <button id="convert-btn" disabled>Convertir a Markdown</button>
  <div id="status"></div>

  <div id="output-section">
    <h2>
      Markdown generado
      <span id="token-hint"></span>
    </h2>
    <textarea id="md-output" readonly></textarea>
    <div class="actions">
      <button onclick="copyMd()">Copiar</button>
      <button class="primary" onclick="downloadMd()">Descargar .md</button>
    </div>
  </div>
</div>

<script>
  const dropZone   = document.getElementById("drop-zone");
  const fileInput  = document.getElementById("file-input");
  const fileNameEl = document.getElementById("file-name");
  const convertBtn = document.getElementById("convert-btn");
  const statusEl   = document.getElementById("status");
  const outputSec  = document.getElementById("output-section");
  const mdOutput   = document.getElementById("md-output");
  const tokenHint  = document.getElementById("token-hint");

  let selectedFile = null;
  let lastFilename = "";

  dropZone.addEventListener("click", () => fileInput.click());
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener("change", () => handleFile(fileInput.files[0]));

  function handleFile(file) {
    if (!file) return;
    const ext = file.name.split(".").pop().toLowerCase();
    if (!["pptx", "pdf"].includes(ext)) {
      setStatus("Solo se aceptan archivos .pptx o .pdf", true);
      return;
    }
    selectedFile = file;
    lastFilename = file.name.replace(/\.[^.]+$/, "");
    fileNameEl.textContent = `📄 ${file.name}  (${(file.size / 1024).toFixed(1)} KB)`;
    convertBtn.disabled = false;
    setStatus("");
    outputSec.style.display = "none";
  }

  convertBtn.addEventListener("click", async () => {
    if (!selectedFile) return;
    convertBtn.disabled = true;
    setStatus("Procesando…");

    const form = new FormData();
    form.append("file", selectedFile);

    try {
      const res = await fetch("/convert", { method: "POST", body: form });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || "Error desconocido");
      }
      const md = await res.text();
      mdOutput.value = md;

      // Rough token estimate: ~4 chars per token
      const chars = md.length;
      const tokens = Math.round(chars / 4);
      tokenHint.textContent = `~${tokens.toLocaleString()} tokens estimados`;

      outputSec.style.display = "block";
      setStatus("¡Listo!");
    } catch (err) {
      setStatus(err.message, true);
    } finally {
      convertBtn.disabled = false;
    }
  });

  function setStatus(msg, isError = false) {
    statusEl.textContent = msg;
    statusEl.className = isError ? "error" : "";
  }

  function copyMd() {
    navigator.clipboard.writeText(mdOutput.value).then(() => setStatus("¡Copiado al portapapeles!"));
  }

  function downloadMd() {
    const blob = new Blob([mdOutput.value], { type: "text/markdown" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${lastFilename || "output"}.md`;
    a.click();
  }
</script>
</body>
</html>
